server {
  listen 80; server_name _; root /usr/share/nginx/html; index index.html; gzip on; gzip_types text/css application/javascript application/json image/svg+xml;
  add_header X-Content-Type-Options nosniff always; add_header X-Frame-Options DENY always; add_header Referrer-Policy strict-origin-when-cross-origin always; add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  location = /healthz { access_log off; return 200 "ok\n"; add_header Content-Type text/plain; }
  location = /index.html { add_header Cache-Control "no-store"; }
  location ~* (sw\.js|workbox-.*\.js)$ { add_header Cache-Control "no-cache"; }
  location /assets/ { add_header Cache-Control "public, max-age=31536000, immutable"; try_files $uri =404; }
  location / { try_files $uri $uri/ /index.html; }
}
